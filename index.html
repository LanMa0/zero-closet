<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>0°C的衣柜</title>
<style>
:root{--bg:#f2f2f7;--card:#fff;--t1:#1c1c1e;--t2:#8e8e93;--t3:#aeaeb2;--sep:#e5e5ea;--tint:#007aff;--red:#ff3b30;--green:#34c759;--orange:#ff9500}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--t1);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;-webkit-font-smoothing:antialiased;line-height:1.47;letter-spacing:0}
#app{max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:68px}
#page{padding:16px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.space-y>*+*{margin-top:12px}
.space-y-sm>*+*{margin-top:6px}
.card{background:var(--card);border-radius:16px;overflow:hidden}
.card-p{background:var(--card);border-radius:16px;padding:16px}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--sep)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat-card{background:var(--card);border-radius:16px;padding:16px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:transform .1s}
.stat-card:active{transform:scale(.98)}
.stat-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff}
.stat-value{font-size:24px;font-weight:700}
.stat-label{font-size:12px;color:var(--t2)}
.badge{font-size:11px;font-weight:500;padding:2px 10px;border-radius:9999px;white-space:nowrap;display:inline-block}
.badge-green{background:rgba(52,199,89,.1);color:var(--green)}
.badge-orange{background:rgba(255,149,0,.1);color:var(--orange)}
.badge-blue{background:rgba(0,122,255,.1);color:var(--tint)}
.badge-gray{background:#e5e5ea;color:var(--t2)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;cursor:pointer;font-family:inherit}
.btn:active{opacity:.7}
.btn-primary{width:100%;padding:12px;background:var(--tint);color:#fff;border-radius:12px;font-size:14px;font-weight:600}
.btn-cancel{flex:1;padding:12px;background:var(--bg);color:var(--t1);border-radius:12px;font-size:14px;font-weight:500}
.btn-delete{flex:1;padding:12px;background:var(--red);color:#fff;border-radius:12px;font-size:14px;font-weight:600}
.btn-ghost{flex:1;padding:8px;background:var(--bg);border-radius:8px;font-size:12px;font-weight:500;color:var(--t1);display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn-ghost-red{flex:1;padding:8px;background:var(--bg);border-radius:8px;font-size:12px;font-weight:500;color:var(--red);display:inline-flex;align-items:center;justify-content:center;gap:4px}
.btn-round{width:36px;height:36px;border-radius:9999px;background:var(--tint);color:#fff;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer}
.btn-sm{padding:6px 12px;background:var(--bg);border-radius:8px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:inherit}
.btn-info{width:100%;padding:12px;background:var(--card);border-radius:16px;font-size:14px;color:var(--red);display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit}
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3)}
.search-input{width:100%;background:var(--card);border-radius:12px;padding:10px 16px 10px 36px;font-size:14px;border:1px solid transparent;outline:none;font-family:inherit}
.search-input:focus{border-color:var(--tint)}
.search-input::placeholder{color:var(--t3)}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;font-weight:500;color:var(--t2);margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;background:var(--bg);border-radius:12px;padding:10px 16px;font-size:14px;border:1px solid transparent;outline:none;font-family:inherit}
.form-input:focus,.form-textarea:focus,.form-select:focus{border-color:var(--tint)}
.form-textarea{resize:none}
.status-btns{display:flex;gap:8px}
.status-btn{flex:1;padding:8px;border-radius:12px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:inherit;text-align:center;transition:all .2s}
.status-btn.active{background:var(--tint);color:#fff}
.status-btn:not(.active){background:var(--bg);color:var(--t2)}
.status-option{width:100%;padding:12px 16px;background:var(--bg);border-radius:12px;font-size:14px;font-weight:500;border:none;cursor:pointer;font-family:inherit;text-align:left;margin-bottom:8px}
.status-option:active{background:#d1d1d6}
.info-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2)}
.info-row svg{flex-shrink:0}
.notes-box{font-size:12px;color:var(--t2);background:var(--bg);border-radius:8px;padding:8px 12px;margin-bottom:12px}
.action-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer}
.action-row:active{background:rgba(0,0,0,.03)}
.action-row+.action-row{border-top:1px solid var(--sep)}
.order-row{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.order-row+.order-row{border-top:1px solid var(--sep)}
.menu-row{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;width:100%;border:none;background:none;font-family:inherit;color:var(--t2)}
.menu-row:active{background:rgba(0,0,0,.03)}
.menu-row+.menu-row{border-top:1px solid var(--sep)}
.tabs{display:flex;gap:4px;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:16px;overflow-x:auto;-ms-overflow-style:none;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--card);box-shadow:0 1px 3px rgba(0,0,0,.1);color:var(--t1)}
.tab:not(.active){background:transparent;color:var(--t2)}
.progress{width:100%;height:8px;background:var(--bg);border-radius:9999px;overflow:hidden}
.progress-bar{height:100%;background:var(--tint);border-radius:9999px;transition:width .5s}
.nav-bar{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(255,255,255,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--sep)}
.nav-inner{max-width:480px;margin:0 auto;display:flex;align-items:center;justify-content:space-around;height:52px;padding:0 8px;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;width:56px;border:none;background:none;cursor:pointer;font-family:inherit;transition:color .2s}
.nav-item.active{color:var(--tint)}
.nav-item:not(.active){color:var(--t3)}
.nav-label{font-size:10px;font-weight:500;line-height:1}
/* Mobile: hide English label in bottom nav and show Chinese tooltip on hover */
@media (max-width:960px){
  .nav-bar .nav-label{display:none}
  .nav-bar .nav-item{position:relative;width:56px}
  .nav-bar .nav-item .nav-sub{position:absolute;display:none;bottom:62px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:6px 10px;border-radius:8px;font-size:12px;white-space:nowrap;z-index:120}
  .nav-bar .nav-item:hover .nav-sub{display:block}
}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.modal-box{background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;animation:slideUp .3s ease-out}
.modal-hd{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--sep);z-index:1}
.modal-hd h2{font-size:16px;font-weight:600}
.modal-close{padding:4px;border-radius:9999px;border:none;background:none;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(0,0,0,.05)}
.modal-bd{padding:20px}
.img-upload{width:80px;height:80px;border-radius:12px;overflow:hidden;position:relative;background:var(--bg);cursor:pointer;margin:0 auto}
.img-upload img{width:100%;height:100%;object-fit:cover}
.img-upload-ov{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s}
.img-upload:hover .img-upload-ov{opacity:1}
.avatar-wrap{width:64px;height:64px;border-radius:9999px;overflow:hidden;position:relative;background:var(--bg);cursor:pointer;flex-shrink:0}
.avatar-wrap img{width:100%;height:100%;object-fit:cover}
.avatar-ov{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;border-radius:9999px}
.avatar-wrap:hover .avatar-ov{opacity:1}
.product-thumb{width:64px;height:64px;border-radius:12px;overflow:hidden;flex-shrink:0;background:var(--bg)}
.product-thumb img{width:100%;height:100%;object-fit:cover}
.empty{text-align:center;padding:64px 16px;font-size:14px;color:var(--t3)}
.spacer{height:16px}
[data-action]{cursor:pointer}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.mini-swatch{width:14px;height:14px;border-radius:9999px;display:inline-block;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.size-tag{font-size:10px;padding:2px 6px;background:var(--bg);border-radius:4px;color:var(--t2)}
.color-item{display:flex;align-items:center;gap:8px;padding:6px 8px;background:var(--bg);border-radius:8px;margin-bottom:4px}
.color-swatch{width:20px;height:20px;border-radius:9999px;display:inline-block;border:1px solid rgba(0,0,0,.1);flex-shrink:0}
.color-del{width:20px;height:20px;border-radius:9999px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t3)}
.color-del:hover{background:rgba(0,0,0,.05);color:var(--red)}
.size-btns{display:flex;gap:6px;flex-wrap:wrap}
.size-btn{padding:6px 14px;border-radius:8px;font-size:12px;font-weight:500;border:1px solid var(--sep);cursor:pointer;font-family:inherit;background:var(--card);color:var(--t1);transition:all .2s}
.size-btn.active{background:var(--tint);color:#fff;border-color:var(--tint)}
.size-btn:not(.active):hover{background:var(--bg)}
:root{--bg:#f7f8fa;--card:#ffffff;--t1:#111827;--t2:#6b7280;--t3:#9ca3af;--sep:#eceff3;--tint:#4f46e5;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--hero-bg-start:#fbf6ee;--hero-bg-mid:#f3e6d6;--hero-bg-end:#ebd9c5;--motion-hover:160ms;--motion-press:180ms;--motion-expand:360ms;--motion-data:560ms}
body{background:linear-gradient(135deg,#f7f8fa 0%,#f1f5f9 100%);color:var(--t1)}
#app{max-width:none;display:flex;min-height:100vh;background:transparent}
#page{flex:1;min-width:0;padding:24px 28px 36px}
.page-shell{display:flex;flex-direction:column;gap:20px}
.topbar{position:sticky;top:12px;z-index:24;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 18px;background:rgba(255,255,255,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.8);border-radius:22px;box-shadow:0 16px 36px rgba(15,23,42,.08)}
.topbar-title h2{font-size:20px;font-weight:700;line-height:1.2}
.topbar-title p{font-size:12px;color:var(--t2);margin-top:2px}
.topbar-search{flex:1;max-width:420px;position:relative}
.topbar-search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--t3)}
.topbar-search input{width:100%;border:1px solid rgba(15,23,42,.05);outline:none;background:rgba(247,248,250,.95);border-radius:999px;padding:10px 14px 10px 38px;font-size:13px;color:var(--t1);font-family:inherit;box-shadow:inset 0 1px 2px rgba(15,23,42,.03)}
.topbar-right{display:flex;align-items:center;gap:10px}
.topbar-chip{padding:8px 10px;border-radius:999px;background:rgba(15,23,42,.04);color:var(--t2);font-size:12px;font-weight:600;box-shadow:inset 0 1px 0 rgba(255,255,255,.5)}
.nav-bar{position:sticky;top:16px;left:0;align-self:start;width:240px;height:calc(100vh - 32px);padding:20px 14px;background:rgba(255,255,255,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(15,23,42,.05);border-radius:24px;display:flex;flex-direction:column;gap:14px;box-shadow:0 24px 42px rgba(15,23,42,.06)}
.nav-brand{padding:8px 10px 12px;border-bottom:1px solid var(--sep);margin-bottom:4px}
.nav-brand h3{font-size:15px;font-weight:700}
.nav-brand p{font-size:11px;color:var(--t2);margin-top:2px}
.nav-inner{display:flex;flex-direction:column;gap:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border:none;background:transparent;border-radius:14px;color:var(--t2);font-family:inherit;font-size:13px;font-weight:600;transition:all .2s ease;text-align:left}
.nav-item:hover{transform:translateY(-1px);background:rgba(15,23,42,.04)}
.nav-item.active{background:linear-gradient(90deg,rgba(79,70,229,.1),rgba(79,70,229,.04));color:var(--t1);border-left:2px solid var(--tint);box-shadow:inset 0 1px 0 rgba(255,255,255,.45)}
.nav-item .nav-sub{font-size:10px;color:var(--t3);display:none;margin-top:1px}
.nav-item:hover .nav-sub{display:block}
.modal-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;background:rgba(15,23,42,.36);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);opacity:0;transition:opacity .24s ease-out}
.modal-bg.modal-enter{opacity:1}
.modal-bg.modal-closing{opacity:0}
.modal-box{background:#fff;width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:90vh;overflow-y:auto;transform:translateY(100%);transition:transform .28s cubic-bezier(.2,.8,.2,1)}
.modal-box.modal-box-enter{transform:translateY(0)}
.modal-box.modal-box-closing{transform:translateY(100%)}
.modal-hd{position:sticky;top:0;background:rgba(255,255,255,.9);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--sep);z-index:1}
.modal-hd h2{font-size:16px;font-weight:600}
.modal-close{padding:4px;border-radius:9999px;border:none;background:none;cursor:pointer;color:var(--t2);display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(0,0,0,.05)}
.modal-bd{padding:20px}
.hero-card{display:grid;grid-template-columns:1.3fr .9fr;gap:18px;padding:22px;border-radius:24px;background:linear-gradient(135deg,var(--hero-bg-start) 0%,var(--hero-bg-mid) 60%,var(--hero-bg-end) 100%);color:var(--t1);box-shadow:0 14px 32px rgba(33,25,18,.06);transition:transform var(--motion-expand) ease-out,box-shadow var(--motion-expand) ease-out,background-color var(--motion-expand) ease-out}
.hero-card h3{font-size:24px;font-weight:700;margin-bottom:8px}
.hero-card p{font-size:14px;color:rgba(255,255,255,.76);line-height:1.6}
.hero-actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.hero-actions .btn{padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.12);color:#fff;font-size:13px;font-weight:600}
.hero-panel{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:16px;padding:14px;display:flex;flex-direction:column;gap:10px}
.hero-panel .panel-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;color:rgba(255,255,255,.76)}
.stat-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}
.stat-card{background:var(--card);border:1px solid var(--sep);border-radius:20px;padding:16px;display:flex;flex-direction:column;gap:10px;cursor:pointer;transition:transform var(--motion-hover) ease-out,box-shadow var(--motion-hover) ease-out,border-color var(--motion-hover) ease-out;box-shadow:0 10px 26px rgba(15,23,42,.05)}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 14px 30px rgba(15,23,42,.08)}
.section-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
.card{background:var(--card);border:1px solid var(--sep);border-radius:20px;overflow:hidden;box-shadow:0 10px 26px rgba(15,23,42,.05)}
.card-p{background:var(--card);border:1px solid var(--sep);border-radius:20px;padding:18px;box-shadow:0 10px 26px rgba(15,23,42,.05)}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--sep)}
.card-list>*+*{border-top:1px solid var(--sep)}
.tag-row{display:flex;gap:8px;flex-wrap:wrap}
.tag{padding:6px 10px;border-radius:999px;background:var(--bg);color:var(--t2);font-size:12px;font-weight:600}
.fold-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--sep)}
.fold-row:last-child{border-bottom:none}
.timeline{display:flex;flex-direction:column;gap:10px}
.timeline-item{display:flex;gap:10px;align-items:flex-start;padding:10px 0}
.timeline-dot{width:10px;height:10px;border-radius:999px;background:var(--tint);margin-top:6px;flex-shrink:0}
.timeline-item .meta{font-size:12px;color:var(--t2)}
.product-card{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--sep)}
.product-card:last-child{border-bottom:none}
.summary-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(79,70,229,.08);color:var(--tint);font-size:12px;font-weight:600}
.page-content{display:flex;flex-direction:column;gap:18px}
.card-p,.card,.stat-card{transition:transform var(--motion-expand) ease-out,box-shadow var(--motion-expand) ease-out,border-color var(--motion-expand) ease-out}
.card-p:hover,.card:hover,.stat-card:hover{transform:translateY(-2px);box-shadow:0 16px 30px rgba(15,23,42,.08);border-color:rgba(79,70,229,.16)}
.reveal-panel{max-height:0;opacity:0;overflow:hidden;transition:max-height var(--motion-expand) ease-out,opacity var(--motion-expand) ease-out,margin-top var(--motion-expand) ease-out}
.card-p:hover .reveal-panel,.card:hover .reveal-panel,.stat-card:hover .reveal-panel{max-height:110px;opacity:1;margin-top:10px}
.card.expanded .reveal-panel,.card-p.expanded .reveal-panel{max-height:500px;opacity:1;margin-top:12px}
.decision-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--sep)}
.decision-meta{font-size:12px;color:var(--t2);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.decision-pill{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:rgba(15,23,42,.04);color:var(--t1);font-size:11px;font-weight:700;letter-spacing:.02em}
/* Page content transitions (smooth page/card switching) */
.content-enter{animation:contentIn .35s ease-out both}
.content-exit{animation:contentOut .28s ease-out both}
@keyframes contentIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes contentOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}
/* Hero card motion tweaks */
.hero-card:hover{transform:translateY(-4px);box-shadow:0 20px 36px rgba(33,25,18,.1)}
.hero-main{display:flex;flex-direction:column;gap:12px}
.hero-metric{font-size:32px;font-weight:800;color:#3b2a20}
.hero-sub{font-size:13px;color:#7a5f48}
/* Hover / click feedback for buttons */
.btn:active{transform:scale(.98);transition:transform var(--motion-press) cubic-bezier(.2,.9,.2,1)}
.skeleton-shell,.skeleton-card,.skeleton-line,.skeleton-block{position:relative;overflow:hidden;background:linear-gradient(90deg,rgba(255,255,255,.65),rgba(245,247,250,.95),rgba(255,255,255,.65));background-size:200% 100%}
.skeleton-card{border-radius:16px;padding:16px;box-shadow:0 10px 26px rgba(15,23,42,.04)}
.skeleton-line,.skeleton-block{border-radius:999px;background:rgba(236,239,243,.9)}
.skeleton-block{height:40px;border-radius:12px}

function orderItemsDisplay(o) {
  if(o.items&&o.items.length>0){
    if(o.items.length===1) return o.items[0].productName||'';
    var first = o.items[0].productName||'';
    return first + ' 等' + o.items.length + '款';
  }
  return o.productName||'';
}
function orderTotalQty(o) {
  if(o.items) return o.items.reduce(function(s,it){return s+it.quantity;},0);
  return o.quantity||0;
}
function orderCustomerName(o) {
  if(o.customer&&typeof o.customer==='object') return o.customer.name||'';
  return o.customer||'';
}
function orderTotal(o) {
  if(o.total!==undefined) return o.total;
  return o.amount||0;
}

function generateOrderNo(){
  var d=new Date();
  var prefix='ORD-'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'-';
  var sameDay=S.orders.filter(function(o){return o.orderNo&&o.orderNo.indexOf(prefix)===0;}).length;
  return prefix+('000'+(sameDay+1)).slice(-3);
}
function calcOrderTotals(items, shipping, discount){
  var subtotal=0;
  (items||[]).forEach(function(item){subtotal += (item.unitPrice||0)*(item.quantity||0);});
  var total = subtotal + (shipping||0) - (discount||0);
  if(total < 0) total = 0;
  return {subtotal: subtotal, shipping: shipping||0, discount: discount||0, total: total};
}
function restoreOrderInventory(order){
  if(!order || order.status==='已取消') return;
  (order.items||[]).forEach(function(item){
    var p=S.products.find(function(prod){return prod.id===item.productId;});
    if(p) p.stock = (p.stock||0) + (item.quantity||0);
  });
}
function reduceOrderInventory(order){
  if(!order || order.status==='已取消') return;
  (order.items||[]).forEach(function(item){
    var p=S.products.find(function(prod){return prod.id===item.productId;});
    if(p) p.stock = (p.stock||0) - (item.quantity||0);
  });
}
function adjustInventoryForOrderChange(oldOrder, newOrder){
  if(oldOrder && oldOrder.status!=='已取消') restoreOrderInventory(oldOrder);
  if(newOrder && newOrder.status!=='已取消') reduceOrderInventory(newOrder);
}

function saveOrder(){
  if(!formOrderItems||formOrderItems.length===0){alert('请至少添加一个商品到订单。');return;}
  formOrderCustomer={
    name:(document.getElementById('o-customer-name')||{}).value||'',
    phone:(document.getElementById('o-customer-phone')||{}).value||'',
    wechat:(document.getElementById('o-customer-wechat')||{}).value||'',
    address:(document.getElementById('o-customer-address')||{}).value||'',
    notes:(document.getElementById('o-customer-notes')||{}).value||''
  };
  formShipping=Number((document.getElementById('o-shipping')||{}).value)||0;
  formDiscount=Number((document.getElementById('o-discount')||{}).value)||0;
  formOrderNote=(document.getElementById('o-order-note')||{}).value||'';
  var totals=calcOrderTotals(formOrderItems, formShipping, formDiscount);
  var orderNoVal = (document.getElementById('o-order-no')||{}).value || (editId? (S.orders.find(function(o){return o.id===editId})||{}).orderNo : generateOrderNo());
  var order={
    id: editId || 'o'+Date.now(),
    orderNo: orderNoVal,
    customer: JSON.parse(JSON.stringify(formOrderCustomer)),
    items: JSON.parse(JSON.stringify(formOrderItems)),
    subtotal: totals.subtotal,
    shipping: totals.shipping,
    discount: totals.discount,
    total: totals.total,
    note: formOrderNote,
    status: formOrderStatus,
    createdAt: editId? (S.orders.find(function(o){return o.id===editId})||{}).createdAt : new Date().toISOString().slice(0,10)
  };
  var oldOrder = editId? S.orders.find(function(o){return o.id===editId}) : null;
  if(editId){
    var idx=S.orders.findIndex(function(o){return o.id===editId});
    if(idx>=0) S.orders[idx]=order;
    else S.orders.unshift(order);
  } else {
    S.orders.unshift(order);
  }
  adjustInventoryForOrderChange(oldOrder, order);
  save();
  if(curPage==='orders') updateListForPage();
  closeModal();
}

function renderStats(){
  var today=new Date();
  function fmtDate(d){return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2);}
  var todayKey=fmtDate(today);
  var yesterday=new Date(today);
  yesterday.setDate(today.getDate()-1);
  var yesterdayKey=fmtDate(yesterday);
  var monthKey=today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2);
  var activeOrders=S.orders.filter(function(o){return o.status!=='已取消';});
  var todayOrders=activeOrders.filter(function(o){return o.createdAt===todayKey;}).length;
  var yesterdayOrders=activeOrders.filter(function(o){return o.createdAt===yesterdayKey;}).length;
  var monthOrders=activeOrders.filter(function(o){return o.createdAt&&o.createdAt.indexOf(monthKey)===0;}).length;
  var totalAmount=activeOrders.reduce(function(s,o){return s+(o.total||0);},0);
  var totalProfit=activeOrders.reduce(function(sum,o){return sum+((o.items||[]).reduce(function(itemSum,it){var p=S.products.find(function(prod){return prod.id===it.productId;});var cost=p?p.costPrice||0:0;return itemSum+(((it.unitPrice||0)-cost)*(it.quantity||0));},0));},0);
  var lowStockProducts=S.products.filter(function(p){return (p.stock||0) <= (p.minStock||0);});
  var inventoryWarning=lowStockProducts.length;
  var salesMap={};
  activeOrders.forEach(function(o){(o.items||[]).forEach(function(item){if(!item.productId)return;var row=salesMap[item.productId]||(salesMap[item.productId]={id:item.productId,name:item.productName||'',qty:0,amount:0});row.qty += item.quantity||0;row.amount += (item.unitPrice||0)*(item.quantity||0);});});
  var topProducts=Object.keys(salesMap).map(function(pid){var row=salesMap[pid];if(!row.name){var prod=S.products.find(function(p){return p.id===pid});row.name=prod?prod.name:'未知商品';}return row;}).sort(function(a,b){return b.qty-a.qty;}).slice(0,5);
  var hotProducts=topProducts.slice(0,3);
  var orderStatusStats=ORDER_STATUS_LIST.map(function(s){return{label:s,count:S.orders.filter(function(o){return o.status===s;}).length};});
  var maxStatusCount=Math.max.apply(null,orderStatusStats.map(function(s){return s.count;}).concat([1]));
  var factoryStats=['合作中','待确认','已暂停'].map(function(s){return{label:s,count:S.factories.filter(function(f){return f.status===s}).length};});
  var maxFactoryCount=Math.max.apply(null,factoryStats.map(function(s){return s.count;}).concat([1]));
  var chartMax=Math.max.apply(null,topProducts.map(function(p){return p.qty;}).concat([1]));
  var r='<div class="flex-between mb-4"><div><h1 style="font-size:28px;font-weight:700">Insights</h1><p style="font-size:12px;color:var(--t2);margin-top:4px">GMV / 利润 / 库存健康度</p></div><span class="summary-pill">本月</span></div>';
  r+='<div class="stat-grid mb-6"><div class="stat-card" style="cursor:default"><p class="stat-value" data-animate-number data-target="'+todayOrders+'">'+todayOrders+'</p><p class="stat-label">今日订单</p></div><div class="stat-card" style="cursor:default"><p class="stat-value" data-animate-number data-target="'+totalAmount+'">¥'+totalAmount+'</p><p class="stat-label">成交金额</p></div><div class="stat-card" style="cursor:default"><p class="stat-value" data-animate-number data-target="'+totalProfit+'">¥'+totalProfit+'</p><p class="stat-label">利润</p></div></div>';
  r+='<div class="section-grid mb-6"><div class="card-p"><h2 style="font-size:16px;font-weight:700;margin-bottom:16px">订单状态统计</h2><div class="space-y">';
  orderStatusStats.forEach(function(s){r+='<div><div class="flex-between" style="margin-bottom:6px"><span style="font-size:12px;color:var(--t2)">'+esc(s.label)+'</span><span style="font-size:12px;font-weight:500">'+s.count+'</span></div><div class="progress"><div class="progress-bar" style="width:'+((s.count/maxStatusCount)*100)+'%"></div></div></div>';});
  r+='</div></div><div class="card-p"><h2 style="font-size:16px;font-weight:700;margin-bottom:16px">销量排行</h2>';
  if(topProducts.length===0){r+='<p style="font-size:12px;color:var(--t3);text-align:center;padding:16px 0">暂无销售数据</p>';} else {topProducts.forEach(function(p,index){r+='<div style="margin-bottom:12px"><div class="flex-between" style="margin-bottom:4px"><span style="font-size:13px;color:var(--t1);font-weight:600">'+(index+1)+'. '+esc(p.name)+'</span><span style="font-size:12px;color:var(--t2)">'+p.qty+' 件</span></div><div class="progress"><div class="progress-bar" style="width:'+((p.qty/chartMax)*100)+'%"></div></div></div>';});}
  r+='</div></div>';
  r+='<div class="section-grid"><div class="card-p"><h2 style="font-size:16px;font-weight:700;margin-bottom:16px">热卖商品</h2>';
  if(hotProducts.length===0){r+='<p style="font-size:12px;color:var(--t3);text-align:center;padding:16px 0">暂无热卖商品</p>';} else {hotProducts.forEach(function(p){r+='<div style="display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--sep)"><div><p style="font-size:14px;font-weight:600;line-height:1.3">'+esc(p.name)+'</p><p style="font-size:12px;color:var(--t2);margin-top:4px">销售额 ¥'+p.amount+'</p></div><div style="text-align:right"><p style="font-size:16px;font-weight:700">'+p.qty+'</p><p style="font-size:10px;color:var(--t2);margin-top:2px">件</p></div></div>';} );}
  r+='</div><div class="card-p"><h2 style="font-size:16px;font-weight:700;margin-bottom:16px">库存预警与工厂</h2><div class="space-y">';
  r+='<div class="fold-row"><span style="font-size:14px;color:var(--t2)">库存预警</span><span style="font-size:16px;font-weight:700">'+inventoryWarning+'</span></div>';
  factoryStats.forEach(function(f){r+='<div class="fold-row"><span style="font-size:14px;color:var(--t2)">'+esc(f.label)+'</span><span style="font-size:16px;font-weight:700">'+f.count+'</span></div>';});
  r+='</div></div></div>';
  return r;
}

function updateOrderItemDOM(idx){ try{ var container=document.getElementById('order-items-container'); if(!container) return; var itemEl = container.children[idx]; var item = formOrderItems && formOrderItems[idx]; if(!itemEl || !item) return;
    // update product select (in case product changed)
    var selProduct = itemEl.querySelector('[data-action="order-item-change"][data-field="productId"]'); if(selProduct) selProduct.value = item.productId || '';
    // rebuild color options if needed
    var selColor = itemEl.querySelector('[data-action="order-item-change"][data-field="color"]'); if(selColor){ while(selColor.firstChild) selColor.removeChild(selColor.firstChild); var prod = S.products.find(function(p){return p.id===item.productId;}); var colors = (prod&&prod.colors)?prod.colors:[]; var opt = document.createElement('option'); opt.value=''; opt.textContent='请选择颜色'; selColor.appendChild(opt); colors.forEach(function(c){ var o=document.createElement('option'); o.value=c.name; o.textContent=c.name; if(item.color===c.name) o.selected=true; selColor.appendChild(o); }); if(colors.length===0 && item.color){ var o=document.createElement('option'); o.value=item.color; o.textContent=item.color; o.selected=true; selColor.appendChild(o); } }
    // rebuild size options
    var selSize = itemEl.querySelector('[data-action="order-item-change"][data-field="size"]'); if(selSize){ while(selSize.firstChild) selSize.removeChild(selSize.firstChild); var prod2 = S.products.find(function(p){return p.id===item.productId;}); var sizes = (prod2&&prod2.sizes)?prod2.sizes:[]; var opt2 = document.createElement('option'); opt2.value=''; opt2.textContent='请选择尺码'; selSize.appendChild(opt2); sizes.forEach(function(sz){ var o=document.createElement('option'); o.value=sz; o.textContent=sz; if(item.size===sz) o.selected=true; selSize.appendChild(o); }); if(sizes.length===0 && item.size){ var o=document.createElement('option'); o.value=item.size; o.textContent=item.size; o.selected=true; selSize.appendChild(o); } }
    // update quantity input
    var qtyIn = itemEl.querySelector('[data-action="order-item-change"][data-field="quantity"]'); if(qtyIn) qtyIn.value = item.quantity || 1;
    // update unit price display (disabled input)
    var uprice = itemEl.querySelector('.form-input[disabled]'); if(uprice) uprice.value = item.unitPrice || 0;
    // update line total display
    var lineTotalEl = itemEl.querySelector('div[style*="小计"]') || null; if(!lineTotalEl){ // fallback: find last div with currency
      var spans = itemEl.querySelectorAll('div'); for(var i=0;i<spans.length;i++){ if((spans[i].textContent||'').indexOf('¥')>=0){ lineTotalEl=spans[i]; break; } }
    }
    if(lineTotalEl){ // set the inner text to current subtotal
      var subtotal = (item.unitPrice||0)*(item.quantity||1); var html = '<span style="font-size:12px;color:var(--t2)">小计</span><div style="font-size:16px;font-weight:700">¥'+subtotal+'</div>'; lineTotalEl.innerHTML = html;
    }
    // finally update totals
    updateOrderTotals();
}catch(e){} }

span class="decision-meta">决策动作</span><strong style="font-size:12px;color:var(--t1)">'+esc((p.stock<=p.minStock?'立即补货':'维持观察'))+'</strong></div><div class="decision-meta">库存余量 '+p.stock+' · '+esc(p.category)+' 仍是本周核心 SKU</div></div>'; h+='<div style="display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--sep);padding-top:12px">'; h+='<button type="button" class="btn-ghost" data-action="edit-product" data-id="'+p.id+'" style="flex:1">'+icon('edit',14)+' 编辑</button>'; h+='<button type="button" class="btn-ghost-red" data-action="delete-product" data-id="'+p.id+'" style="width:40px;flex:none">'+icon('trash',14)+'</button>'; h+='</div></div>'; }); var container=document.getElementById('products-list'); if(container) container.innerHTML = (filtered.length===0?'<div class="empty">暂无商品数据</div>':h); else render(); }
    if(curPage==='factories'){ var q=searchQuery.toLowerCase(); var filtered=S.factories.filter(function(f){return f.name.toLowerCase().indexOf(q)>=0||f.contact.toLowerCase().indexOf(q)>=0||f.address.toLowerCase().indexOf(q)>=0;}); var h=''; filtered.forEach(function(f){ h+='<div class="card-p"><div class="flex-between mb-2"><div><h3 style="font-size:14px;font-weight:600">'+esc(f.name)+'</h3><p style="font-size:12px;color:var(--t2);margin-top:2px">'+esc(f.contact)+'</p></div>'+statusBadge(f.status)+'</div>'; h+='<div class="space-y-sm mb-3"><div class="info-row">'+icon('phone',12)+' '+esc(f.phone)+'</div><div class="info-row">'+icon('message',12)+' 微信: '+esc(f.wechat)+'</div><div class="info-row">'+icon('mapPin',12)+' '+esc(f.address)+'</div></div>'; if(f.notes) h+='<div class="notes-box">'+esc(f.notes)+'</div>'; h+='<div class="reveal-panel"><div class="decision-row"><span class="decision-meta">下一步判断</span><strong style="font-size:12px;color:var(--t1)">'+esc(f.status==='合作中'?'维持合作节奏':'评估供应稳定性')+'</strong></div><div class="decision-meta">'+esc(f.status)+' · '+esc(f.notes||'无补充备注')+'</div></div>'; h+='<div style="display:flex;gap:8px;margin-top:12px;border-top:1px solid var(--sep);padding-top:12px"><button type="button" class="btn-ghost" data-action="edit-factory" data-id="'+f.id+'">'+icon('edit',13)+' 编辑</button><button class="btn-ghost-red" data-action="delete-factory" data-id="'+f.id+'">'+icon('trash',13)+' 删除</button></div></div>'; }); var containerF=document.getElementById('factories-list'); if(containerF) containerF.innerHTML = (filtered.length===0?'<div class="empty">暂无工厂数据</div>':h); else render(); }
    if(curPage==='orders'){ var q=searchQuery.toLowerCase(); var filtered=S.orders.filter(function(o){var text=(orderItemsDisplay(o)+' '+orderCustomerName(o)+' '+(o.orderNo||'')).toLowerCase();return text.indexOf(q)>=0;}); if(curFilter && curFilter !== '全部'){ filtered=filtered.filter(function(o){return o.status===curFilter;}); } filtered.sort(function(a,b){ if(orderSort==='date_asc') return new Date(a.createdAt)-new Date(b.createdAt); if(orderSort==='date_desc') return new Date(b.createdAt)-new Date(a.createdAt); if(orderSort==='total_asc') return (a.total||0)-(b.total||0); if(orderSort==='total_desc') return (b.total||0)-(a.total||0); if(orderSort==='name_asc') return orderCustomerName(a).localeCompare(orderCustomerName(b)); if(orderSort==='name_desc') return orderCustomerName(b).localeCompare(orderCustomerName(a)); return new Date(b.createdAt)-new Date(a.createdAt); }); var h=''; filtered.forEach(function(o){ h+='<div class="card-p"><div class="flex-between mb-2"><div><p style="font-size:14px;font-weight:600">'+esc(orderItemsDisplay(o))+' × '+orderTotalQty(o)+'</p><p style="font-size:12px;color:var(--t2);margin-top:2px">'+esc(orderCustomerName(o))+' · '+esc(o.createdAt)+'</p><p style="font-size:12px;color:var(--t2);margin-top:2px">订单号: '+esc(o.orderNo||'')+'</p></div>'+statusBadge(o.status)+'</div>'; h+='<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:12px"><div><p style="font-size:18px;font-weight:700">¥'+(o.total||0)+'</p><p style="font-size:12px;color:var(--t2)">商品金额 ¥'+(o.subtotal||0)+' / 运费 ¥'+(o.shipping||0)+' / 优惠 ¥'+(o.discount||0)+'</p></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button type="button" class="btn-ghost" data-action="edit-order" data-id="'+o.id+'">编辑</button><button class="btn-ghost" data-action="copy-order" data-id="'+o.id+'">复制</button><button class="btn-ghost-red" data-action="delete-order" data-id="'+o.id+'" style="width:40px;flex:none">'+icon('trash',14)+'</button></div></div>'; function applyAnimatedNumbers(){ document.querySelectorAll('[data-animate-number]').forEach(function(el){ var to = Number(el.getAttribute('data-target'))||0; var isCurrency = (el.textContent||'').indexOf('¥')>=0; var duration = 600; animateNumber(el,to,duration,isCurrency); }); }

function animateNumber(el,to,duration,isCurrency){ var text = el.textContent||''; var from = Number(el.getAttribute('data-from')) || Number(String(text).replace(/[^0-9.-]/g,'')) || 0; el.setAttribute('data-from',from); var start = performance.now(); function tick(now){ var t = Math.min(1,(now-start)/duration); var eased = 0.5 - Math.cos(Math.PI * t)/2; var val = from + (to-from)*eased; if(isCurrency) el.textContent = '¥'+Math.round(val); else el.textContent = Math.round(val); if(t<1) requestAnimationFrame(tick); } requestAnimationFrame(tick); }

function setupCardInteractions(){ document.querySelectorAll('.card-p, .card').forEach(function(card){ if(card._konicBound) return; card._konicBound=true; card.addEventListener('click', function(e){ if(e.target.closest('[data-action]')) return; card.classList.toggle('expanded'); var expanded = card.classList.contains('expanded'); if(expanded){ card.querySelectorAll('.reveal-panel').forEach(function(r){ r.style.maxHeight = '500px'; r.style.opacity=1; r.style.marginTop='12px'; }); } else { card.querySelectorAll('.reveal-panel').forEach(function(r){ r.style.maxHeight = ''; r.style.opacity=''; r.style.marginTop=''; }); } }); }); document.querySelectorAll('.btn, .btn-sm, .nav-item').forEach(function(btn){ if(btn._konicFeedback) return; btn._konicFeedback=true; btn.addEventListener('pointerdown',function(){ btn.style.transition='transform var(--motion-press) cubic-bezier(.2,.9,.2,1)'; btn.style.transform='scale(.98)'; }); btn.addEventListener('pointerup',function(){ btn.style.transform=''; }); btn.addEventListener('pointerleave',function(){ btn.style.transform=''; }); }); }

 window.addEventListener('hashchange',function(){if(skipHash){skipHash=false;return;}var h=location.hash.slice(2);if(h&&['factories','products','orders','stats','profile'].indexOf(h)>=0)curPage=h;else curPage='home';searchQuery='';curFilter='全部';render();});
